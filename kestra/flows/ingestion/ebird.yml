id: ebird_ingestion
namespace: grackle_watch.ingestion

description: |
  Ingests Great-tailed Grackle sighting records from the eBird API
  across 5 US states with a rolling 30-day observation window.
  Writes raw Parquet files to GCS Bronze layer.

inputs:
  - id: back
    type: INT
    defaults: 30
    description: "Number of days back to fetch observations (max 30)"

tasks:
  - id: ingest_ebird
    type: io.kestra.plugin.scripts.python.Commands
    namespaceFiles:
      enabled: true
    containerImage: victoriaaa10/grackle-watch-ingest:latest
    commands:
      - |
        cat <<EOF > sa.json
        {{ kv("GOOGLE_APPLICATION_CREDENTIALS") }}
        EOF
      - python -c "import json; json.load(open('sa.json')); print('VALID JSON')"
      - python 01_ebird_ingest.py --back {{ inputs.back }}
    env:
      GOOGLE_APPLICATION_CREDENTIALS: "sa.json"
      DESTINATION__FILESYSTEM__BUCKET_URL: "{{ kv('DESTINATION__FILESYSTEM__BUCKET_URL') }}"
      EBIRD_API_KEY: "{{ kv('EBIRD_API_KEY') }}"
      DATA_WRITER__FILE_FORMAT: "parquet"

triggers:
  - id: schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 0 * * *"  # runs daily at midnight